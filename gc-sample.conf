; gt-checksum 配置文件参考

; 定义源、目标数据源
; 这部分参数不能全部为空
[DSNs]
srcDSN = mysql|u1:p1@tcp(172.17.0.1:3307)/information_schema?charset=utf8mb4
dstDSN = mysql|u1:p1@tcp(172.17.0.2:3307)/information_schema?charset=utf8mb4
; 目前只支持MySQL、Oracle两种数据源
; Oracle DSN格式为：oracle|user/password@ip:port/sid
; 例如：srcDSN = oracle|scott/tiger@172.16.0.1:1521/helowin
;
; MySQL DSN格式为：mysql|usr:password@tcp(ip:port)/dbname?charset=xxx
; 例如：dstDSN = mysql|checksum:Checksum@3306@tcp(172.16.0.1:3306)/information_schema?charset=utf8mb4


; 定义校验数据对象
; 这部分参数不能全部为空，至少要配置tables参数
[Schema]
tables = test.*
; 配置参数中，table=*.*表示匹配所有库（MySQL数据源则自动排除 information_schema, mysql, performance_schema, sys 等几个系统库）
; 库表名称都支持模糊匹配（无论是table还是ignoreTable）
; %代表模糊，*代表所有
; 常用模糊规则示例：
;  - %schema.xxx
;  - %schema%.xxx
;  - schema%.xxx
;  - schema.%table
;  - schema.table%
;  - schema.%table%
;  - schema.table
; 如果已经设置了"*.*"，则不能再添加其他值
; 例如设置规则"*.*,pcms%.*"时会报告table参数设置错误
; 当参数table和ignoreTable的值设置相同时也会报错

; 参数tables用来定义校验数据表对象，支持通配符"%"和"*"
; 例如：
; *.* 表示所有库表对象（MySQL数据源则自动排除 information_schema, mysql, performance_schema, sys 等几个系统库）
; test.* 表示test库下的所有表
; test.t% 表示test库下所有表名中包含字母"t"开头的表
; db%.* 表示所有库名中包含字母"db"开头的数据库中的所有表
; %db.* 表示所有库名中包含字母"db"结尾的数据库中的所有表

ignoreTables =
; 参数 ignoreTables 用来定义忽略的数据对象规则
; ignoreTables 参数的配置规则和 tables 参数相同

checkNoIndexTable = no
; 设置是否检查没有索引的表，可设置为 [yes | no]，默认值：no
; 如果为设置则使用默认值 no
; checkNoIndexTable = yes | no

caseSensitiveObjectName = no
; 设置是否忽略库名、表名、字段名等数据对象名的大小写，可设置为 [yes | no]，默认值：no
; no，忽略tables和ignoreTables涉及的数据对象名大小写规则，统一使用大写库名及表名
; yes，按照tables和ignoreTables参数涉及的数据对象名的大小写进行匹配
; caseSensitiveObjectName = yes | no


; 其他校验规则
; 这部分参数如果不设置则使用相应的默认值
[Rules]
parallelThds = 10
; 数据校验工作时的并行线程数，默认值：10

chunkSize = 10000
; 设置单列索引每次检索多少条数据进行校验，默认值：10000，建议范围：1000 - 10000
; 注：该值设置太大时有可能会造成SQL查询效率反倒下降的情况发生，一般建议设置不超过10000

queueSize = 1000
; 设置校验队列深度，默认值：1000

checkMode = rows
; 设置数据校验模式，可设置为 [count|rows|sample]，默认值：rows
; count 表示只校验源、目标表的数据量
; rows 表示逐行校验源、目标数据
; sample 表示只进行抽样数据校验，配合参数ratio设置采样率
; checkMode = rows | count | sample

ratio = 10
; 当 checkMode = sample 时，设置数据采样率，默认值：10
; 设置范围 [1-100]，用百分比表示，1表示1%，100表示100%

checkObject = data
; 设置数据校验对象，可设置为 [data|struct|index|partitions|foreign|trigger|func|proc]，默认值：data
; 分别表示：行数据|表结构|索引|分区|外键|触发器|存储函数|存储过程
; checkObject = data | struct | index | partitions | foreign | trigger | func | proc

memoryLimit = 1024
; 设置内存使用限制，当内存使用超过该值时，会自动退出，避免内存溢出
; 设置范围 [100 - 65536]，默认值：1024，单位：MB（不支持附加KB、MB、GB等单位写法）


; 设置表结构校验规则，当checkObject为struct时才会生效
; 这部分参数如果不设置则使用相应的默认值
[Struct]
ScheckMod = strict
; 设置struct校验时的校验模式，可设置为：[strict | loose]，默认值：strict
; strict，严格匹配列的所有属性
; loose，宽松模式，只匹配列名
; ScheckMod = strict | loose

ScheckOrder = yes
; 设置struct校验工作模式下时是否校验列的顺序，可设置为：[yes | no]，默认值：yes
; yes，按照源端的列的正序进行校验
; no，无需按照源端的列的正序进行检查
; ScheckOrder = yes | no

ScheckFixRule = src
; 设置修复列的属性及顺序的依据原则，可设置为 [src | dst]，默认值：src
; src，按照源端的列属性进行修复
; dst，按照目标端的列属性进行修复
; 当缺少列时，修复语句会按照源端的列数据类型生成
; ScheckFixRule = src | dst


; 设置数据修复方案
; 这部分参数如果不设置则使用相应的默认值
[Repair]
datafix = file
; 数据修复方式，可设置为 [file | table]
; file，生成数据修复SQL文件
; table，直接在线修复数据
; datafix = file | table

fixTrxNum = 100
; 修复事务数，即单个事务包含多少个DML语句，默认值：100

fixFileName = ./gt-checksum-DataFix.sql
; 设置生成修复SQL文件时相应的文件名
; 当 datafix = file 时，设置生成的SQL文件名，可以指定为绝对路径或相对路径
; 当 datafix = table 时，可以不用设置 fixFileName 参数


; 设置日志文件名及等级
; 这部分参数如果不设置则使用相应的默认值
[Logs]
logFile = ./gt-checksum.log
; 设置日志文件名，可以指定为绝对路径或相对路径
; 如果不设置则使用默认值 "./gt-checksum.log"
; 支持日期时间格式，例如：gt-checksum-%Y%m%d%H%M%S.log
; 当前可支持的日期时间格式有以下几种：
; %Y：年（如2025）
; %m：月（如09）
; %d：日（如09）
; %H：小时（如08）
; %M：分钟（如08）
; %S：秒（如08）
; %s：当前时间戳（如1757409298）
; %F：完整日期（如2025-09-09）
; %T：完整时间（如08:08:08）

logLevel = info
; 设置日志等级，可设置为 [debug | info | warn | error]，默认值：info
; 如果不设置则使用默认值 info


;
; 一个极简配置文件案例
; 仅需配置srcDSN, dstDSN, tables三个参数，其余参数均自动使用默认值
;
;[DSNs]
;srcDSN = mysql|checksum:checksum@tcp(127.0.0.1:3306)/information_schema?charset=utf8mb4
;dstDSN = mysql|checksum:checksum@tcp(127.0.0.1:3307)/information_schema?charset=utf8mb4
;
;[Schema]
;tables=sbtest.sbtest1
